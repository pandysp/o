<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Obsidian...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    a {
      color: #89b4fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <p id="msg">Redirecting to Obsidian...</p>
    <p id="fallback" style="display:none">
      If nothing happened, <a id="link" href="#">click here to open in Obsidian</a>.
    </p>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get("file");
    const vault = params.get("vault");

    if (file) {
      const url = new URL("obsidian://open");
      url.searchParams.set("file", file);
      if (vault) url.searchParams.set("vault", vault);

      const target = url.toString();
      document.getElementById("link").href = target;
      location.href = target;

      setTimeout(() => {
        document.getElementById("fallback").style.display = "";
      }, 1500);
    } else {
      document.getElementById("msg").textContent =
        "Missing ?file= parameter. Usage: ?file=path/to/note.md&vault=MyVault";
    }
  </script>
</body>
</html>
